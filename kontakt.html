<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTB Weather - Contact</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <a href="index.html" class="logo">MTB Weather</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="prognoza.html">Forecast</a></li>
                <li><a href="trasy.html">Trails</a></li>
                
                <li><a href="kontakt.html" class="active">Contact</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="auth.html" class="login">Log in</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2>Contact Us</h2>
                <p>Do you have questions about trails or forecasts? Write to us, and we'll try to respond as soon as possible.</p>
                
                <div class="contact-wrapper">
                    <form id="contact-form" class="modern-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your name..." required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Your email address..." required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
                        </div>

                        <button type="submit" class="btn">Send Message</button>
                    </form>
                    
                    <div id="form-status" class="form-status"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
