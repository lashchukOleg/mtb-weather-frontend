<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTB Weather - Kontakt</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <a href="index.html" class="logo">MTB Weather</a>
            <ul>
                <li><a href="index.html">Strona Główna</a></li>
                <li><a href="prognoza.html">Prognoza</a></li>
                <li><a href="trasy.html">Trasy</a></li>
                <li><a href="wideo.html">Wideo</a></li>
                <li><a href="kontakt.html" class="active">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2>Skontaktuj się z nami</h2>
                <p>Masz pytania dotyczące tras lub prognozy? Napisz do nas, a postaramy się odpowiedzieć jak najszybciej.</p>
                
                <div class="contact-wrapper">
                    <form id="contact-form" class="modern-form">
                        <div class="form-group">
                            <label for="name">Imię</label>
                            <input type="text" id="name" name="name" placeholder="Twoje imię..." required>
                        </div>

                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="Twój adres e-mail..." required>
                        </div>

                        <div class="form-group">
                            <label for="message">Wiadomość</label>
                            <textarea id="message" name="message" placeholder="W czym możemy Ci pomóc?" required></textarea>
                        </div>

                        <button type="submit" class="btn">Wyślij wiadomość</button>
                    </form>
                    
                    <div id="form-status" class="form-status"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
