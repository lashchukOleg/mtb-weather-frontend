<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTB Weather - Weather Forecast</title>
    
    

    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <a href="index.html" class="logo">
                MTB Weather
            </a>
            
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="prognoza.html">Forecast</a></li>
                <li><a href="trasy.html">Trails</a></li>

    <main>
        <section class="forecast-section">
            <div class="container">
                <h2>Check the weather forecast for any location</h2>
                <p>Enter the name of a city or region to see current conditions and recommendations.</p>
                
                <form class="search-form" id="weather-form">
                    <input type="text" id="city-input" placeholder="E.g. Bielsko-Biała, Karpacz..." aria-label="Enter city name">
                    <button type="submit" class="btn">Search</button>
                </form>
                
                <div id="weather-results" class="weather-results-container">
                    </div>

            </div>
        </section>

        
    </main>
<script src="main.js"></script>
