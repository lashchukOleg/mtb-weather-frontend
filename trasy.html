<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTB Weather - Popularne Trasy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <a href="index.html" class="logo">MTB Weather</a>
            <ul>
                <li><a href="index.html">Strona Główna</a></li>
                <li><a href="prognoza.html">Prognoza</a></li>
                <li><a href="trasy.html" class="active">Trasy</a></li>
                <li><a href="wideo.html">Wideo</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="trails-section">
            <div class="container">
                <h2>Najlepsze trasy MTB w zasięgu ręki</h2>
                <p>Odkryj najpopularniejsze bike parki i ścieżki enduro. Mapa zawiera wyselekcjonowane miejsca idealne na Twoją kolejną przygodę.</p>
                
                <div class="map-wrapper">
                    <div class="map-wrapper">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d81577.6322986423!2d15.688176510343753!3d50.75150531558913!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x470ec3747124f0c7%3A0xc0672e1f40071336!2sKarkonoski%20Park%20Narodowy!5e0!3m2!1spl!2spl!4v1700000000000!5m2!1spl!2spl" 
        width="100%" 
        height="600" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</div>
                </div>
            </div>
        </section>
    </main>

    <section class="add-trail-section">
    <div class="container">
        <h3>Udostępnij swoją trasę</h3>
        <form id="add-trail-form" class="modern-form">
            <div class="form-group">
                <input type="text" id="trail-name" placeholder="Nazwa trasy (np. Singletrack pod Smrekiem)" required>
            </div>
            <div class="form-group">
                <select id="trail-difficulty">
                    <option value="easy">Łatwa (Zielona)</option>
                    <option value="medium">Średnia (Niebieska)</option>
                    <option value="hard">Trudna (Czarna)</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="trail-link" placeholder="Link do Google Maps lub Stravy" required>
            </div>
            <button type="submit" class="btn">Dodaj trasę na listę 🏔️</button>
        </form>

        <div id="user-trails-list" class="user-trails-grid"></div>
    </div>
</section>

    <script src="js/main.js"></script>
</body>
</html>
