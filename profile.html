<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MTB Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <nav class="container">
            <a href="index.html" class="logo">MTB Weather</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="prognoza.html">Forecast</a></li>
                <li><a href="trasy.html">Trails</a></li>
                
                <li><a href="kontakt.html">Contact</a></li>
                <li><a href="profile.html" class="active">Profile</a></li>
                <li><a href="auth.html" class="login">Log in</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <h2>My Profile</h2>
            <div id="profileData">
                <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
                <button onclick="logout()">Log Out</button>
            </div>
        </div>
    </main>

    <script>
        async function loadProfile() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'auth.html';
                return;
            }

            const response = await fetch('https://mtb-weather-backend.onrender.com/api/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const user = await response.json();
                document.getElementById('userEmail').innerText = user.email;
            } else {
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'auth.html';
        }

        loadProfile();
    </script>
</body>
</html>
