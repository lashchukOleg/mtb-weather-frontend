<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Профиль</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Личный кабинет</h2>
        <div id="profileData">
            <p><strong>Email:</strong> <span id="userEmail">Загрузка...</span></p>
            <button onclick="logout()">Выйти</button>
        </div>
    </div>

    <script>
        async function loadProfile() {
            const token = localStorage.getItem('token'); // Берем токен из памяти браузера
            if (!token) {
                window.location.href = 'auth.html'; // Если нет токена — на вход
                return;
            }

            const response = await fetch('https://mtb-weather-backend.onrender.com/api/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const user = await response.json();
                document.getElementById('userEmail').innerText = user.email;
            } else {
                logout(); // Если токен плохой — выходим
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'auth.html';
        }

        loadProfile();
    </script>
</body>
</html>
