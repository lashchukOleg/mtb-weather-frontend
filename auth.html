<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход и Регистрация</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="auth-container">
        <div id="loginBlock">
            <h2>Вход</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="#" onclick="toggleAuth()">Зарегистрироваться</a></p>
        </div>

        <div id="registerBlock" style="display: none;">
            <h2>Регистрация</h2>
            <form id="registerForm">
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button type="submit">Создать аккаунт</button>
            </form>
            <p>Уже есть аккаунт? <a href="#" onclick="toggleAuth()">Войти</a></p>
        </div>

        <p id="statusMessage" style="font-weight: bold; margin-top: 15px;"></p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
